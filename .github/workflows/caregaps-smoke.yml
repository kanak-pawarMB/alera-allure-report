name: CareGaps Smoke Tests
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  caregaps-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run CareGaps smoke tests
        run: npx playwright test tests/smoke/CareGaps.spec.js --project=smoke
